path: /home/ulas/datasets/animal_kingdom_yolop1
train: images/train
val: images/test

kpt_shape: [23, 3] # 23 keypoints, each with (x, y, visibility)

# Fixed Flip indices based on your JSON flip_pairs:
# [1,2], [4,5], [7,8], [9,10], [11,12], [14,15], [16,17], [18,19]
flip_idx: [0, 2, 1, 3, 5, 4, 6, 8, 7, 10, 9, 12, 11, 13, 15, 14, 17, 16, 19, 18, 20, 21, 22]

names:
  0: Amphibian
  1: Bird
  2: Fish
  3: Mammal
  4: Reptile

# Keypoint names (Single list is usually enough for YOLO, 
# but your C++ code can iterate this)
kpt_names:
  - head_mid_top        # 0
  - eye_left            # 1
  - eye_right           # 2
  - mouth_front_top     # 3
  - mouth_back_left     # 4
  - mouth_back_right    # 5
  - mouth_front_bottom  # 6
  - shoulder_left       # 7
  - shoulder_right      # 8
  - elbow_left          # 9
  - elbow_right         # 10
  - wrist_left          # 11
  - wrist_right         # 12
  - torso_mid_back      # 13
  - hip_left            # 14
  - hip_right           # 15
  - knee_left           # 16
  - knee_right          # 17
  - ankle_left          # 18
  - ankle_right         # 19
  - tail_top_back       # 20
  - tail_mid_back       # 21
  - tail_end_back       # 22